<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary Sparks - Cadet Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { background: '#0A0A0B', surface: 'rgba(255, 255, 255, 0.03)', border: 'rgba(255, 255, 255, 0.08)', brand: '#7C3AED', brandHover: '#6D28D9' } } } }
    </script>
    <style>
        body { background-color: #0A0A0B; background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%); background-attachment: fixed; }
        input:focus { outline: none; box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-200 font-sans antialiased">
    <div class="w-full max-w-md p-8 rounded-2xl bg-surface backdrop-blur-xl border border-border shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand to-transparent opacity-50"></div>
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand/20 text-brand mb-4 border border-brand/30 shadow-[0_0_15px_rgba(124,58,237,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-wide">Visionary Sparks</h2>
            <p class="text-sm text-gray-400 mt-2">Sign in to begin your mission</p>
        </div>
        <div class="space-y-4">
            <div><input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg bg-black/40 border border-border text-white placeholder-gray-500 focus:border-brand transition-all duration-300"></div>
            <div><input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg bg-black/40 border border-border text-white placeholder-gray-500 focus:border-brand transition-all duration-300"></div>
            <button id="authBtn" class="w-full py-3 px-4 bg-brand hover:bg-brandHover text-white font-semibold rounded-lg shadow-[0_0_20px_rgba(124,58,237,0.4)] transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2 mt-2">
                <span id="btnText">Continue</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>
        <div class="mt-6 text-center text-sm text-gray-400">
            <a href="#" id="toggleModeBtn" class="text-brand hover:text-brandHover transition-colors">New here? Create an account</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        console.log("✅ Login Script successfully loaded!");
        
        // 🚨 REPLACE THESE TWO STRINGS WITH YOUR ACTUAL SUPABASE URL AND ANON KEY 🚨
        const supabaseUrl = 'https://gpjozyrsvxvfaowgfrob.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdwam96eXJzdnh2ZmFvd2dmcm9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0Mzc4MTcsImV4cCI6MjA5NjAxMzgxN30.CWlQLph_ARfC_LV99NrhaY1C2z5KfSA_LH_fX7_AeQc';
        
        // 🚨 FIXED: Renamed to "supabaseClient" to prevent the syntax crash!
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authBtn = document.getElementById('authBtn');
        const btnText = document.getElementById('btnText');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        
        let isSignUp = false;

        // Toggle Login / Signup UI
        toggleModeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            btnText.innerText = isSignUp ? "Create Account" : "Continue";
            toggleModeBtn.innerText = isSignUp ? "Already have an account? Sign in" : "New here? Create an account";
        });

        // Handle Button Click
        authBtn.addEventListener('click', async () => {
            console.log("🔘 Button clicked! Mode:", isSignUp ? "Sign Up" : "Sign In");
            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            btnText.innerText = "Processing...";

            try {
                if (isSignUp) {
                    console.log("⏳ Attempting to create account in Supabase...");
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    console.log("🎉 Sign Up Success:", data);
                    alert("Account created! Logging you in...");
                    window.location.href = "index.html"; 
                } else {
                    console.log("⏳ Attempting to verify credentials in Supabase...");
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    console.log("🎉 Sign In Success:", data);
                    window.location.href = "index.html"; 
                }
            } catch (error) {
                console.error("❌ Auth Error:", error.message);
                alert("Error: " + error.message);
            } finally {
                btnText.innerText = isSignUp ? "Create Account" : "Continue";
            }
        });
    </script>
</body>
</html>
